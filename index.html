<!-- Promo Pepsi V0505.02 -->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Pepsi 2026 — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
[data-theme="light"]{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f5f8fb;--border:#dde4ed;--border2:#c8d4e0;
  --text:#0d1b2e;--muted:#6b829a;--shadow:0 2px 8px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--table-hover:#eef3ff;--header-bg:#fff;
  --header-border:#dde4ed;--toggle-bg:#e2e8f0;--toggle-knob:#fff;--grid-line:#e8edf3;
  --card-border:#e2e8f2;
}
[data-theme="dark"]{
  --bg:#05090f;--surface:#0c1220;--surface2:#121c2e;--border:#1e2d45;--border2:#2a3d58;
  --text:#e8f0f8;--muted:#5a7a99;--shadow:0 2px 8px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.2);
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);--table-hover:rgba(0,74,173,.08);--header-bg:#080e18;
  --header-border:#1e2d45;--toggle-bg:#1e2d45;--toggle-knob:#004aad;--grid-line:#1e2d45;
  --card-border:#1e2d45;
}
:root{--accent:#004aad;--red:#e4002b;--success:#0a8a5c;--warn:#d97706;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px;transition:background .25s,color .25s;}

/* HEADER */
header{background:var(--header-bg);border-bottom:2px solid var(--header-border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);transition:background .25s,border-color .25s;}
.logo-area{display:flex;align-items:center;gap:14px;}
.pepsi-logo{height:52px;width:52px;border-radius:50%;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.header-titles{display:flex;flex-direction:column;line-height:1.1;}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text);}
.header-title span{color:var(--accent);}
.header-sub{font-size:.68rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:12px;}
.refresh-badge{display:flex;align-items:center;gap:7px;background:rgba(0,74,173,.08);border:1px solid rgba(0,74,173,.2);border-radius:20px;padding:5px 12px;font-size:.72rem;color:var(--accent);font-weight:500;}
.refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.last-update{font-size:.71rem;color:var(--muted);}
.theme-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
.toggle-switch{width:40px;height:22px;border-radius:11px;background:var(--toggle-bg);position:relative;cursor:pointer;border:1px solid var(--border2);transition:background .25s;flex-shrink:0;}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--toggle-knob);top:2px;left:2px;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
[data-theme="dark"] .toggle-switch::after{left:20px;}

/* LAYOUT */
main{padding:24px 28px;max-width:1600px;margin:0 auto;}
.tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:2px solid var(--border);}
.tab{padding:10px 22px;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-2px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* KPI CARDS — mejoradas */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--surface);border:1px solid var(--card-border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s,background .25s,border-color .25s;}
.kpi-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--kpi-c1,var(--accent)),var(--kpi-c2,var(--accent)));border-radius:14px 14px 0 0;}
.kpi-icon{font-size:1.4rem;margin-bottom:8px;display:block;}
.kpi-label{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:6px;font-weight:700;}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:2.4rem;font-weight:800;color:var(--text);line-height:1;}
.kpi-sub{font-size:.7rem;color:var(--muted);margin-top:5px;line-height:1.3;}
.kpi-delta{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;padding:2px 7px;border-radius:10px;margin-top:6px;}
.kpi-delta.good{background:rgba(10,138,92,.12);color:#0a8a5c;}
.kpi-delta.warn{background:rgba(217,119,6,.12);color:#d97706;}
.kpi-delta.bad{background:rgba(228,0,43,.1);color:#e4002b;}

/* SECTION */
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin:26px 0 12px;border-left:3px solid var(--accent);padding-left:10px;}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.chart-wide{grid-column:1/-1;}
.chart-card{background:var(--surface);border:1px solid var(--card-border);border-radius:14px;padding:20px 22px;box-shadow:var(--shadow-sm);transition:background .25s,border-color .25s;}
.chart-title{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.line-wrap{height:200px;}
.line-wrap svg{width:100%;height:100%;}

/* FUNNEL — formato visual real */
.funnel-container{display:flex;flex-direction:column;align-items:center;gap:0;padding:8px 0;}
.funnel-step-wrap{width:100%;display:flex;flex-direction:column;align-items:center;}
.funnel-shape{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;border-radius:6px;transition:width .9s ease;position:relative;cursor:default;}
.funnel-shape:hover{filter:brightness(1.08);}
.funnel-label{font-size:.78rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.funnel-count{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;flex-shrink:0;margin-left:12px;}
.funnel-pct{font-size:.68rem;color:rgba(255,255,255,.8);flex-shrink:0;margin-left:6px;}
.funnel-connector{display:flex;align-items:center;justify-content:center;height:28px;gap:6px;}
.funnel-arrow-line{width:1px;height:20px;background:var(--border2);}
.funnel-arrow-pct{font-size:.68rem;color:var(--muted);background:var(--surface2);padding:1px 7px;border-radius:10px;border:1px solid var(--border);}

/* BARS */
.bar-chart{display:flex;flex-direction:column;gap:9px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{width:190px;font-size:.76rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.bar-track{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;border:1px solid var(--border);}
.bar-fill{height:100%;border-radius:5px;transition:width .8s ease;}
.bar-val{width:60px;text-align:right;font-size:.75rem;color:var(--muted);flex-shrink:0;font-weight:500;}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:22px;}
.donut-legend{display:flex;flex-direction:column;gap:7px;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:.78rem;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow-sm);transition:background .25s,border-color .25s;}
.table-header-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);gap:8px;flex-wrap:wrap;transition:background .25s;}
.table-search{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:6px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;width:190px;outline:none;transition:border-color .2s,background .25s;}
.table-search:focus{border-color:var(--accent);}
.table-actions{display:flex;gap:6px;}
.btn-action{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.74rem;cursor:pointer;transition:all .15s;font-weight:500;}
.btn-action:hover{border-color:var(--accent);color:var(--accent);}
.btn-action.copied{border-color:var(--success);color:var(--success);}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{text-align:left;padding:9px 14px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;font-weight:700;transition:background .25s;}
.data-table td{padding:8px 14px;font-size:.79rem;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;transition:background .25s;}
.data-table tr:hover td{background:var(--table-hover);}
.data-table tr:last-child td{border-bottom:none;}
.num{text-align:right!important;font-variant-numeric:tabular-nums;}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;}
.badge-blue{background:rgba(0,74,173,.12);color:#004aad;}
.badge-green{background:rgba(10,138,92,.12);color:#0a8a5c;}
.badge-gray{background:rgba(107,130,154,.1);color:var(--muted);}
.badge-red{background:rgba(228,0,43,.1);color:#e4002b;}
.badge-warn{background:rgba(217,119,6,.1);color:#d97706;}

/* RATIO TABLE */
.ratio-ok{color:var(--success);font-weight:600;}
.ratio-warn{color:var(--warn);font-weight:600;}
.ratio-bad{color:var(--red);font-weight:700;}

/* FILTER */
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;}
.size-tab{padding:4px 12px;border-radius:14px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .2s;font-weight:500;}
.size-tab:hover{border-color:var(--accent);color:var(--accent);}
.size-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.filter-select{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;outline:none;cursor:pointer;transition:border-color .2s,background .25s;}
.filter-select:focus{border-color:var(--accent);}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:flex-end;gap:5px;padding:10px 14px;border-top:1px solid var(--border);font-size:.76rem;color:var(--muted);flex-wrap:wrap;background:var(--surface2);transition:background .25s;}
.page-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:.74rem;transition:all .15s;}
.page-btn:hover{border-color:var(--accent);color:var(--accent);}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* MISC */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:14px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:40px;color:var(--muted);font-size:.85rem;}
.error-msg strong{color:var(--red);display:block;margin-bottom:8px;}
.no-data{color:var(--muted);font-size:.8rem;padding:20px 0;}
</style>
</head>

<script>
const SOURCES={
  canjes:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDKhUrngn2pGnyHNlPFXEvBU57ni0xKgUVQ3zOIHER3-UJkcSdCrDejHaZDx4yug/pub?output=csv',

const BLUES=['#003a8c','#004aad','#0057cc','#0066ee','#1a7fff','#4d9fff','#80bbff','#b3d6ff'];
const PAL=['#004aad','#e4002b','#0099cc','#00875a','#e67700','#7c3aed','#0891b2','#be185d'];
const PAGE=15;

const COMBO_NAMES={
  'Combo Promo Pepsi fútbol Pepsi 2l 1+5 uds total país':'Pepsi 2 litros',
  'Combo Promo Pepsi fútbol Pepsi Black 2l 1+5 uds total país':'Pepsi Black 2 litros',
  'Combo Promo Pepsi fútbol Pepsi 1.5l 1+5 uds total país':'Pepsi 1.5 litros',
  'Combo Promo Pepsi fútbol Pepsi Black 1.5l 1+5 uds total país':'Pepsi Black 1.5 litros',
  'Combo Promo Pepsi fútbol Pepsi 1l 7+5 uds total país':'Pepsi 1 litro',
  'Combo Promo Pepsi fútbol Pepsi Black 1l 7+5 uds total país':'Pepsi Black 1 litro'
};
const FUTBOL_COMBOS={
  '2l':['Combo Promo Pepsi fútbol Pepsi 2l 1+5 uds total país','Combo Promo Pepsi fútbol Pepsi Black 2l 1+5 uds total país'],
  '1.5l':['Combo Promo Pepsi fútbol Pepsi 1.5l 1+5 uds total país','Combo Promo Pepsi fútbol Pepsi Black 1.5l 1+5 uds total país'],
  '1l':['Combo Promo Pepsi fútbol Pepsi 1l 7+5 uds total país','Combo Promo Pepsi fútbol Pepsi Black 1l 7+5 uds total país']
};
const ALL_FUTBOL=Object.values(FUTBOL_COMBOS).flat();
const SIZES=['2l','1.5l','1l'];

let state={canjes:[],combos:[],futbol:[],cPage:1,cbPage:1,cSearch:'',cbSearch:'',activeSize:'todos',cbDistr:'todos'};

// THEME
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');localStorage.setItem('pepsi-theme',d?'light':'dark');}
(function(){const s=localStorage.getItem('pepsi-theme')||'light';document.documentElement.setAttribute('data-theme',s);})();

// DATA
async function fetchCSV(url){const r=await fetch(url+'&t='+Date.now());const txt=await r.text();return new Promise(res=>Papa.parse(txt,{header:true,skipEmptyLines:true,complete:d=>res(d.data)}));}

async function loadAll(){
  try{
    const[canjes,combos]=await Promise.all([fetchCSV(SOURCES.canjes),fetchCSV(SOURCES.combos)]);
    state.canjes=canjes; state.combos=combos;
    state.futbol=combos.filter(r=>ALL_FUTBOL.includes((r['Combo']||'').trim()));
    document.getElementById('lastUpdate').textContent='Actualizado: '+new Date().toLocaleTimeString('es-UY');
    renderHome(); renderCanjes(); renderCombos();
  }catch(e){
    ['home-content','canjes-content','combos-content'].forEach(id=>{
      document.getElementById(id).innerHTML=`<div class="error-msg"><strong>Error al cargar datos</strong>${e.message}<br><small>Verificá que las planillas estén publicadas como CSV en Google Sheets.</small></div>`;
    });
  }
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); document.getElementById('tab-'+tab).classList.add('active');
}

// UTILS
function num(v){return parseFloat(String(v||0).replace(',','.'))||0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function normalizeRut(r){return String(r||'').replace(/\D/g,'').trim();}
function fmtN(v,dec=0){return v.toLocaleString('es-UY',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function comboShortName(n){return COMBO_NAMES[n]||n.replace('Combo Promo Pepsi fútbol ','');}

// Botellas canjeadas = Vta Bruta+Cta y Orden Bultos * 4 (solo combos PWST)
function botCanjeadas(vtaBruta){return vtaBruta*4;}

function parseCanjesRow(row){
  const p=(row.responses||'').split(';');
  return{rut:normalizeRut(row.RUT),rut_raw:row.RUT||'',created_at:row.created_at||'',
    tamano:p[0]||'',email:p[3]||'',nombre:((p[4]||'')+' '+(p[5]||'')).trim()};
}
function groupByRut(rows){
  const map={};
  rows.forEach(r=>{if(!map[r.rut])map[r.rut]={rut:r.rut,rut_raw:r.rut_raw,nombre:r.nombre,email:r.email,canjes:[]};map[r.rut].canjes.push(r);});
  return Object.values(map);
}

// ── HOME ──
function renderHome(){
  const rows=state.canjes.map(parseCanjesRow);
  const byDate={};rows.forEach(r=>{const d=r.created_at.split(' ')[0];byDate[d]=(byDate[d]||0)+1;});
  const dates=Object.keys(byDate).sort();
  const grouped=groupByRut(rows);

  // Métricas combos PWST
  const totalVtaBruta=state.futbol.reduce((s,r)=>s+num(r['Vta Bruta+Cta y Orden Bultos']),0);
  const totalBotCanj=botCanjeadas(totalVtaBruta);
  const totalBotObseq=state.canjes.length; // cada fila canjes = 1 botella obsequiada
  const ratio=totalBotCanj>0?(totalBotObseq/totalBotCanj):0;

  // RUTs con ratio < 1 (más botellas canjeadas que obsequiadas)
  const combosByRut={};
  state.futbol.forEach(r=>{
    const rut=normalizeRut(r['Rut']);if(!rut)return;
    if(!combosByRut[rut])combosByRut[rut]={distrs:new Set(),vtaBruta:0,cliente:r['Cliente (Cli.)']||''};
    combosByRut[rut].distrs.add(r['Distribuidor (Cli.)']||'');
    combosByRut[rut].vtaBruta+=num(r['Vta Bruta+Cta y Orden Bultos']);
  });
  const canjesByRut={};
  rows.forEach(r=>{canjesByRut[r.rut]=(canjesByRut[r.rut]||0)+1;});

  // Tabla RUTs por distribuidor con ratio
  const rutDistRows=[];
  Object.entries(combosByRut).forEach(([rut,cb])=>{
    const obseq=canjesByRut[rut]||0;
    const canjBot=botCanjeadas(cb.vtaBruta);
    const r=canjBot>0?obseq/canjBot:null;
    [...cb.distrs].forEach(d=>{
      rutDistRows.push({rut,cliente:cb.cliente,distr:d,vtaBruta:cb.vtaBruta,botCanj:canjBot,botObseq:obseq,ratio:r});
    });
  });
  rutDistRows.sort((a,b)=>(a.ratio===null?-1:a.ratio)-(b.ratio===null?-1:b.ratio));
  const badRuts=rutDistRows.filter(r=>r.ratio!==null&&r.ratio<1).length;

  // Funnel — solo 3 pasos
  const distrsSet=new Set(state.futbol.map(r=>r['Distribuidor (Cli.)']||'').filter(Boolean));
  const rutsCombos=new Set(state.combos.map(r=>normalizeRut(r['Rut'])));
  const matchCount=grouped.filter(g=>rutsCombos.has(g.rut)).length;

  const funnelSteps=[
    {label:'Clientes compradores de Pepsi PWST',val:new Set(state.futbol.map(r=>r['Codigo de Cliente']||'').filter(Boolean)).size,color:'#003a8c'},
    {label:'Clientes con compra PWST registrada',val:Object.keys(combosByRut).length,color:'#004aad'},
    {label:'Clientes con canjes',val:grouped.length,color:'#e4002b'},
  ];
  const maxF=funnelSteps[0].val||1;
  const widths=[100,funnelSteps[1].val/maxF*100,funnelSteps[2].val/maxF*100];

  document.getElementById('home-content').innerHTML=`
  <div class="kpi-grid">
    ${kpi('🔁','TOTAL CANJES',fmtN(rows.length),'registros acumulados','#003a8c','#0057cc')}
    ${kpi('👤','CLIENTES CANJEADORES',fmtN(grouped.length),'RUTs únicos con canje','#0057cc','#0099cc')}
    ${kpi('⚽','COMBOS CANJEADOS',fmtN(totalVtaBruta),'Vta Bruta+Cta y Orden Bultos','#e4002b','#ff4d6d')}
    ${kpi('🍾','BOTELLAS CANJEADAS',fmtN(Math.round(totalBotCanj)),'Combos × 4 — todos los calibres','#00875a','#0aaf76')}
    ${kpi('🎁','BOTELLAS OBSEQUIADAS',fmtN(totalBotObseq),'1 por cada canje registrado','#7c3aed','#a855f7')}
    ${kpi('📊','RATIO OBSEQUIADAs/CANJEADAS',ratio.toFixed(2),(ratio>=1?'✅ Saludable':'⚠️ Revisar — '+badRuts+' RUTs bajo 1.0'),ratio>=1?'#00875a':'#d97706',ratio>=1?'#0aaf76':'#f59e0b')}
  </div>

  <div class="charts-grid">
    <div class="chart-card chart-wide">
      <div class="chart-title">Canjes por Día</div>
      ${lineChart(dates,byDate)}
    </div>
    <div class="chart-card">
      <div class="chart-title">Funnel de Clientes</div>
      <div class="funnel-container">
        ${funnelSteps.map((s,i)=>`
          ${i>0?`<div class="funnel-connector">
            <div class="funnel-arrow-line"></div>
            <div class="funnel-arrow-pct">▼ ${funnelSteps[i-1].val>0?Math.round(s.val/funnelSteps[i-1].val*100):0}%</div>
            <div class="funnel-arrow-line"></div>
          </div>`:''}
          <div class="funnel-step-wrap">
            <div class="funnel-shape" style="width:${widths[i].toFixed(1)}%;background:${s.color};min-width:60%">
              <span class="funnel-label">${esc(s.label)}</span>
              <span class="funnel-count">${s.val.toLocaleString('es-UY')}</span>
              <span class="funnel-pct">${Math.round(s.val/maxF*100)}%</span>
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Top Distribuidores — Combos Canjeados</div>
      ${(()=>{const bd={};state.futbol.forEach(r=>{const d=r['Distribuidor (Cli.)']||'—';bd[d]=(bd[d]||0)+num(r['Vta Bruta+Cta y Orden Bultos']);});const top=Object.entries(bd).sort((a,b)=>b[1]-a[1]).slice(0,6);return bars(top,top[0]?.[1]||1,v=>fmtN(v),BLUES);})()}
    </div>
  </div>

  <div class="section-title">Análisis de Ratio por RUT y Distribuidor</div>
  <div class="table-wrap">
    <div class="table-header-bar">
      <div class="chart-title" style="margin:0">RUTs con botellas canjeadas — ratio obsequiadas/canjeadas (${rutDistRows.length} registros, <span style="color:var(--red);font-weight:700">${badRuts} bajo 1.0</span>)</div>
      <div class="table-actions">
        <button class="btn-action" onclick="copyTableToClipboard('ratio-table','ratio-copy-btn')" id="ratio-copy-btn">📋 Copiar</button>
        <button class="btn-action" onclick="exportToExcel('ratio-table','Ratio RUT')">📥 Excel</button>
      </div>
    </div>
    <div style="overflow-x:auto"><table class="data-table" id="ratio-table"><thead><tr>
      <th>RUT</th><th>Cliente</th><th>Distribuidor</th>
      <th class="num">Vta Bruta (CC)</th><th class="num">Bot. Canjeadas</th><th class="num">Bot. Obsequiadas</th><th class="num">Ratio</th><th>Estado</th>
    </tr></thead><tbody>${rutDistRows.slice(0,100).map(r=>{
      const rClass=r.ratio===null?'ratio-warn':r.ratio<1?'ratio-bad':r.ratio>=2?'ratio-ok':'ratio-ok';
      const badge=r.ratio===null?'<span class="badge badge-gray">Sin canjes</span>':r.ratio<1?'<span class="badge badge-red">⚠ Revisar</span>':'<span class="badge badge-green">✓ OK</span>';
      return`<tr>
        <td style="font-weight:600">${esc(r.rut)}</td>
        <td style="max-width:160px">${esc(r.cliente||'—')}</td>
        <td style="color:var(--muted);font-size:.75rem">${esc(r.distr)}</td>
        <td class="num">${fmtN(r.vtaBruta,2)}</td>
        <td class="num">${fmtN(Math.round(r.botCanj))}</td>
        <td class="num">${fmtN(r.botObseq)}</td>
        <td class="num ${rClass}">${r.ratio!==null?r.ratio.toFixed(2):'—'}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('')}${rutDistRows.length>100?`<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:10px">…y ${rutDistRows.length-100} más</td></tr>`:''}</tbody></table></div>
  </div>`;
}

// ── CANJES ──
function renderCanjes(){
  const rows=state.canjes.map(parseCanjesRow);
  const byTam={},byDate={};
  rows.forEach(r=>{byTam[r.tamano]=(byTam[r.tamano]||0)+1;const d=r.created_at.split(' ')[0];byDate[d]=(byDate[d]||0)+1;});
  const dates=Object.keys(byDate).sort();
  const rutsCombos=new Set(state.combos.map(r=>normalizeRut(r['Rut'])));
  const grouped=groupByRut(rows);
  const matchCount=grouped.filter(g=>rutsCombos.has(g.rut)).length;

  document.getElementById('canjes-content').innerHTML=`
  <div class="kpi-grid">
    ${kpi('🔁','TOTAL CANJES',fmtN(rows.length),'registros totales','#004aad','#0057cc')}
    ${kpi('👤','CLIENTES CANJEADORES',fmtN(grouped.length),'RUTs únicos','#0057cc','#0099cc')}
    ${kpi('📦','TAMAÑOS',Object.keys(byTam).length,Object.entries(byTam).map(([k,v])=>k+': '+v).join(' · '),'#e4002b','#ff4d6d')}
    ${kpi('🔗','CON COMBO PWST',fmtN(matchCount),'RUTs con compra asociada','#00875a','#0aaf76')}
    ${kpi('📅','DÍAS ACTIVOS',fmtN(dates.length),(dates[0]||'—')+' → '+(dates[dates.length-1]||'—'),'#e67700','#f59e0b')}
  </div>
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">Por Tamaño</div>${donut(byTam,PAL)}</div>
    <div class="chart-card"><div class="chart-title">Match con Combos PWST</div>${donut({'Con combo':matchCount,'Sin combo':grouped.length-matchCount},['#004aad','#dde4ed'])}</div>
    <div class="chart-card chart-wide"><div class="chart-title">Canjes por Día</div>${lineChart(dates,byDate)}</div>
  </div>
  ${tableCanjes(grouped,rutsCombos)}`;
}

function tableCanjes(grouped,rutsCombos){
  const s=state.cSearch.toLowerCase();
  const f=s?grouped.filter(g=>g.rut_raw.toLowerCase().includes(s)||g.nombre.toLowerCase().includes(s)||g.email.toLowerCase().includes(s)):grouped;
  const pages=Math.ceil(f.length/PAGE)||1;
  state.cPage=Math.min(state.cPage,pages);
  const sl=f.slice((state.cPage-1)*PAGE,state.cPage*PAGE);
  return`<div class="table-wrap">
    <div class="table-header-bar">
      <div class="chart-title" style="margin:0">Canjes por RUT (${f.length})</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input class="table-search" placeholder="Buscar..." value="${esc(state.cSearch)}" oninput="state.cSearch=this.value;state.cPage=1;renderCanjes()">
        <div class="table-actions">
          <button class="btn-action" onclick="copyTableToClipboard('canjes-table','canjes-copy-btn')" id="canjes-copy-btn">📋 Copiar</button>
          <button class="btn-action" onclick="exportToExcel('canjes-table','Canjes')">📥 Excel</button>
        </div>
      </div>
    </div>
    <div style="overflow-x:auto"><table class="data-table" id="canjes-table"><thead><tr>
      <th>RUT</th><th>Nombre</th><th class="num">Canjes</th><th>Tamaños</th><th>Match Combo</th><th>Email</th>
    </tr></thead><tbody>${sl.map(g=>{
      const matched=rutsCombos.has(g.rut);
      const tamMap=g.canjes.reduce((acc,c)=>{acc[c.tamano]=(acc[c.tamano]||0)+1;return acc;},{});
      const tamStr=Object.entries(tamMap).map(([k,v])=>`<span class="badge badge-blue">${esc(k)}×${v}</span>`).join(' ');
      return`<tr>
        <td style="font-weight:600">${esc(g.rut_raw)}</td><td>${esc(g.nombre||'—')}</td>
        <td class="num">${g.canjes.length}</td><td>${tamStr}</td>
        <td>${matched?'<span class="badge badge-green">✓ Compró combo</span>':'<span class="badge badge-gray">Sin combo</span>'}</td>
        <td style="color:var(--muted)">${esc(g.email||'—')}</td>
      </tr>`;
    }).join('')}</tbody></table></div>
    ${pagination(pages,state.cPage,'state.cPage','renderCanjes')}
  </div>`;
}

// ── COMBOS PWST ──
function renderCombos(){
  const size=state.activeSize;
  const distr=state.cbDistr;
  const bySize=size==='todos'?state.futbol:state.futbol.filter(r=>FUTBOL_COMBOS[size]?.includes((r['Combo']||'').trim()));
  const allDistrs=[...new Set(state.futbol.map(r=>r['Distribuidor (Cli.)']||'').filter(Boolean))].sort();
  const filtered=distr==='todos'?bySize:bySize.filter(r=>(r['Distribuidor (Cli.)']||'')===distr);

  const totalCC=state.futbol.reduce((s,r)=>s+num(r['Vta Bruta+Cta y Orden Bultos']),0);
  const totalBotCanj=botCanjeadas(totalCC);
  const totalBotObseq=state.canjes.length;
  const distrsSet=new Set(state.futbol.map(r=>r['Distribuidor (Cli.)']||'').filter(Boolean));

  const ccByCombo={};ALL_FUTBOL.forEach(c=>ccByCombo[c]=0);
  state.futbol.forEach(r=>{const c=(r['Combo']||'').trim();if(ccByCombo[c]!==undefined)ccByCombo[c]+=num(r['Vta Bruta+Cta y Orden Bultos']);});

  const byDistr={};
  bySize.forEach(r=>{const d=r['Distribuidor (Cli.)']||'—';byDistr[d]=(byDistr[d]||0)+num(r['Vta Bruta+Cta y Orden Bultos']);});
  const topDistr=Object.entries(byDistr).sort((a,b)=>b[1]-a[1]);

  const byComboF={};
  filtered.forEach(r=>{const c=comboShortName((r['Combo']||'').trim());byComboF[c]=(byComboF[c]||0)+num(r['Vta Bruta+Cta y Orden Bultos']);});
  const topComboF=Object.entries(byComboF).sort((a,b)=>b[1]-a[1]);

  const ccByComboClean={};
  Object.entries(ccByCombo).forEach(([k,v])=>{ccByComboClean[comboShortName(k)]=v;});

  document.getElementById('combos-content').innerHTML=`
  <div class="kpi-grid">
    ${kpi('⚽','COMBOS CANJEADOS',fmtN(totalCC),'Vta Bruta+Cta y Orden Bultos','#004aad','#0057cc')}
    ${kpi('🍾','BOTELLAS CANJEADAS',fmtN(Math.round(totalBotCanj)),'Vta Bruta × 4','#0057cc','#0099cc')}
    ${kpi('🎁','BOTELLAS OBSEQUIADAS',fmtN(totalBotObseq),'filas en tabla Canjes','#7c3aed','#a855f7')}
    ${kpi('📊','RATIO OBS/CANJ',(totalBotCanj>0?totalBotObseq/totalBotCanj:0).toFixed(2),totalBotObseq>=totalBotCanj?'✅ OK':'⚠️ Revisar',totalBotObseq>=totalBotCanj?'#00875a':'#d97706',totalBotObseq>=totalBotCanj?'#0aaf76':'#f59e0b')}
    ${kpi('🏢','DISTRIBUIDORES',fmtN(distrsSet.size),'con combos PWST','#e4002b','#ff4d6d')}
  </div>

  <div class="filter-row">
    <span class="filter-label">Distribuidor:</span>
    <select class="filter-select" onchange="state.cbDistr=this.value;renderCombos()">
      <option value="todos" ${distr==='todos'?'selected':''}>Todos</option>
      ${allDistrs.map(d=>`<option value="${esc(d)}" ${distr===d?'selected':''}>${esc(d)}</option>`).join('')}
    </select>
    <span class="filter-label" style="margin-left:10px">Tamaño:</span>
    ${['todos','2l','1.5l','1l'].map(s=>`<button class="size-tab${state.activeSize===s?' active':''}" onclick="state.activeSize='${s}';renderCombos()">${s==='todos'?'Todos':s.toUpperCase()}</button>`).join('')}
  </div>

  <div class="section-title">Vista General — Combos Canjeados</div>
  <div class="chart-card chart-wide" style="margin-bottom:16px">
    ${bars(Object.entries(ccByComboClean).sort((a,b)=>b[1]-a[1]),Math.max(...Object.values(ccByComboClean),1),v=>fmtN(v),BLUES)}
  </div>
  <div class="charts-grid">
    <div class="chart-card chart-wide">
      <div class="chart-title">Por Distribuidor${size!=='todos'?' — '+size.toUpperCase():''}</div>
      ${topDistr.length?bars(topDistr.slice(0,15),topDistr[0]?.[1]||1,v=>fmtN(v),BLUES):noData()}
    </div>
    <div class="chart-card chart-wide">
      <div class="chart-title">Por Combo${size!=='todos'?' — '+size.toUpperCase():''}${distr!=='todos'?' — '+distr:''}</div>
      ${topComboF.length?bars(topComboF,topComboF[0]?.[1]||1,v=>fmtN(v),BLUES):noData()}
    </div>
  </div>
  ${tableCombos(filtered)}`;
}

function tableCombos(rows){
  const s=state.cbSearch.toLowerCase();
  const f=s?rows.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(s))):rows;
  const pages=Math.ceil(f.length/PAGE)||1;
  state.cbPage=Math.min(state.cbPage,pages);
  const sl=f.slice((state.cbPage-1)*PAGE,state.cbPage*PAGE);
  return`<div class="table-wrap">
    <div class="table-header-bar">
      <div class="chart-title" style="margin:0">Detalle Combos PWST (${f.length})</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input class="table-search" placeholder="Buscar..." value="${esc(state.cbSearch)}" oninput="state.cbSearch=this.value;state.cbPage=1;renderCombos()">
        <div class="table-actions">
          <button class="btn-action" onclick="copyTableToClipboard('combos-table','combos-copy-btn')" id="combos-copy-btn">📋 Copiar</button>
          <button class="btn-action" onclick="exportToExcel('combos-table','Combos PWST')">📥 Excel</button>
        </div>
      </div>
    </div>
    <div style="overflow-x:auto"><table class="data-table" id="combos-table"><thead><tr>
      <th>Distribuidor</th><th>Cliente</th><th>Combo</th><th class="num">Combos Canjeados</th><th class="num">Bot. Canjeadas</th><th>RUT</th>
    </tr></thead><tbody>${sl.map(r=>{
      const cc=num(r['Vta Bruta+Cta y Orden Bultos']);
      return`<tr>
        <td>${esc(r['Distribuidor (Cli.)']||'—')}</td><td>${esc(r['Cliente (Cli.)']||'—')}</td>
        <td><span class="badge badge-blue">${esc(comboShortName((r['Combo']||'').trim()))}</span></td>
        <td class="num">${fmtN(cc)}</td><td class="num">${fmtN(Math.round(botCanjeadas(cc)))}</td>
        <td style="color:var(--muted);font-size:.72rem">${esc(r['Rut']||'—')}</td>
      </tr>`;
    }).join('')}</tbody></table></div>
    ${pagination(pages,state.cbPage,'state.cbPage','renderCombos')}
  </div>`;
}

// ── EXPORT ──
function copyTableToClipboard(tableId,btnId){
  const table=document.getElementById(tableId);if(!table)return;
  const rows=[];table.querySelectorAll('tr').forEach(tr=>{rows.push([...tr.querySelectorAll('th,td')].map(c=>c.textContent.trim()).join('\t'));});
  navigator.clipboard.writeText(rows.join('\n')).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){btn.textContent='✓ Copiado';btn.classList.add('copied');setTimeout(()=>{btn.innerHTML='📋 Copiar';btn.classList.remove('copied');},2000);}
  });
}
function exportToExcel(tableId,sheetName){
  const table=document.getElementById(tableId);if(!table){alert('Tabla no encontrada');return;}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.table_to_sheet(table),sheetName);
  XLSX.writeFile(wb,sheetName.replace(/ /g,'_')+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

// ── CHART HELPERS ──
function kpi(icon,label,val,sub,c1,c2){
  return`<div class="kpi-card" style="--kpi-c1:${c1};--kpi-c2:${c2}">
    <span class="kpi-icon">${icon}</span>
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${val}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}

function bars(entries,max,fmt,palette){
  fmt=fmt||fmtN;palette=palette||PAL;
  return`<div class="bar-chart">${entries.map(([label,val],i)=>`
    <div class="bar-row">
      <div class="bar-label" title="${esc(label)}">${esc(label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${max>0?(val/max*100).toFixed(1):0}%;background:${palette[i%palette.length]}"></div></div>
      <div class="bar-val">${fmt(val)}</div>
    </div>`).join('')}</div>`;
}

function donut(obj,palette){
  palette=palette||PAL;
  const entries=Object.entries(obj).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);
  if(!total)return noData();
  const R=58,cx=70,cy=70,r=36;let angle=-Math.PI/2;
  const slices=entries.map(([label,val],i)=>{
    const pct=val/total,a1=angle,a2=angle+pct*2*Math.PI;angle=a2;
    const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
    return{label,val,pct,path:`M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${pct>.5?1:0},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z`,color:palette[i%palette.length]};
  });
  return`<div class="donut-wrap">
    <svg width="140" height="140" viewBox="0 0 140 140">
      ${slices.map(s=>`<path d="${s.path}" fill="${s.color}"/>`).join('')}
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--surface)"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dy=".35em" fill="var(--text)" font-size="13" font-family="Barlow Condensed" font-weight="700">${total.toLocaleString('es-UY')}</text>
    </svg>
    <div class="donut-legend">${slices.slice(0,6).map(s=>`
      <div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div>
      <span>${esc(s.label)} <span style="color:var(--muted)">(${(s.pct*100).toFixed(0)}%)</span></span></div>`).join('')}</div>
  </div>`;
}

function lineChart(dates,byDate){
  if(!dates.length)return noData();
  const vals=dates.map(d=>byDate[d]||0);
  const maxV=Math.max(...vals)||1;
  const W=760,H=190,pL=44,pR=16,pT=18,pB=34;
  const iW=W-pL-pR,iH=H-pT-pB;
  const pts=dates.map((d,i)=>[pL+(i/(dates.length-1||1))*iW,pT+iH-(vals[i]/maxV)*iH]);
  const pathD=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const area=pathD+` L${pts[pts.length-1][0].toFixed(1)},${pT+iH} L${pts[0][0].toFixed(1)},${pT+iH} Z`;
  const yLabels=[0,.25,.5,.75,1].map(f=>({y:pT+iH-f*iH,val:Math.round(maxV*f)}));
  return`<div class="line-wrap"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="aG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#004aad" stop-opacity=".18"/><stop offset="100%" stop-color="#004aad" stop-opacity="0"/></linearGradient></defs>
    ${yLabels.map(l=>`<line x1="${pL}" y1="${l.y.toFixed(1)}" x2="${W-pR}" y2="${l.y.toFixed(1)}" stroke="var(--grid-line)" stroke-width="1"/>
      <text x="${pL-5}" y="${(l.y+4).toFixed(1)}" text-anchor="end" fill="var(--muted)" font-size="10">${l.val}</text>`).join('')}
    <path d="${area}" fill="url(#aG)"/>
    <path d="${pathD}" fill="none" stroke="#004aad" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="5" fill="#004aad" stroke="var(--surface)" stroke-width="2.5"/>
      <text x="${p[0].toFixed(1)}" y="${(H-5).toFixed(1)}" text-anchor="middle" fill="var(--muted)" font-size="9.5">${dates[i]}</text>
      <text x="${p[0].toFixed(1)}" y="${(p[1]-10).toFixed(1)}" text-anchor="middle" fill="#004aad" font-size="10" font-weight="700">${vals[i]}</text>`).join('')}
  </svg></div>`;
}

function noData(){return'<div class="no-data">Sin datos</div>';}

function pagination(pages,current,varName,renderFn){
  if(pages<=1)return'';
  const btns=[];
  for(let i=1;i<=pages;i++)btns.push(`<button class="page-btn${i===current?' active':''}" onclick="${varName}=${i};${renderFn}()">${i}</button>`);
  return`<div class="pagination">Pág ${current}/${pages} &nbsp; ${btns.join('')}</div>`;
}

loadAll();
setInterval(loadAll,REFRESH_MS);
</script>
